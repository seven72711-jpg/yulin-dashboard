<style>
:root {

}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-weight: 400; line-height: 1.5; -webkit-font-smoothing: antialiased; background-image: radial-gradient(ellipse at 20% 0%, rgba(226,166,84,0.03) 0%, transparent 50%), radial-gradient(ellipse at 80% 100%, rgba(46,165,222,0.02) 0%, transparent 50%); min-height: 100vh; }
.container { max-width: 1520px; margin: 0 auto; padding: 40px 48px; }
.header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 48px; padding-bottom: 32px; border-bottom: 1px solid var(--border); }
.header h1 { font-family: var(--font-display); font-size: 36px; font-weight: 900; color: var(--text-bright); letter-spacing: -1px; line-height: 1.1; }
.header h1 em { font-style: normal; color: var(--accent); }
.header .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); text-align: right; line-height: 1.8; }
.kpi-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; margin-bottom: 40px; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 20px; position: relative; transition: all 0.2s ease; }
.kpi:hover { border-color: var(--border-active); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 8px; font-weight: 500; }
.kpi-value { font-family: var(--font-mono); font-size: 32px; font-weight: 500; color: var(--text-bright); letter-spacing: -1px; }
.kpi-value .unit { font-size: 14px; opacity: 0.4; }
.kpi-change { font-size: 11px; margin-top: 6px; font-family: var(--font-mono); font-weight: 400; }
.kpi-change.up { color: var(--green); } .kpi-change.down { color: var(--red); }
.kpi-dot { position: absolute; top: 16px; right: 16px; width: 6px; height: 6px; border-radius: 50%; }
.kpi-dot.warn { background: var(--red); box-shadow: 0 0 10px rgba(224,69,90,0.4); }
.kpi-dot.ok { background: var(--green); }
.grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; margin-bottom: 40px; }
.span-4 { grid-column: span 4; } .span-6 { grid-column: span 6; } .span-8 { grid-column: span 8; } .span-12 { grid-column: span 12; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; transition: border-color 0.2s; }
.card:hover { border-color: var(--border-active); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
.card-title { font-family: var(--font-body); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text); }
.card-subtitle { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }
.bar-list { display: flex; flex-direction: column; gap: 8px; }
.bar-item { display: flex; align-items: center; gap: 12px; font-size: 12px; }
.bar-label { min-width: 90px; text-align: right; color: var(--text); font-family: var(--font-body); }
.bar-track { flex: 1; height: 24px; background: var(--bg); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 2s cubic-bezier(0.22, 1, 0.36, 1); }
.bar-val { min-width: 60px; font-family: var(--font-mono); font-size: 11px; color: var(--text); text-align: right; }
.mini-bars { display: flex; align-items: flex-end; gap: 6px; height: 100px; padding-top: 4px; }
.mini-bar { flex: 1; border-radius: 3px 3px 0 0; position: relative; }
.mini-bar-label { text-align: center; font-size: 10px; margin-top: 6px; color: var(--text-dim); }
.data-table { width: 100%; font-size: 12px; border-collapse: collapse; }
.data-table th { text-align: left; padding: 10px 12px; font-weight: 600; color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); }
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; }
.data-table tbody tr:hover td { background: var(--surface-raised); }

.sim-group { margin-bottom: 12px; }
.sim-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; color: var(--text); }
.sim-val { font-family: var(--font-mono); color: var(--accent); font-weight: 500; }
.sim-slider { width: 100%; accent-color: var(--accent); height: 4px; }
.sim-result { margin-top: 16px; padding: 20px; background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: center; }
.sim-big { font-family: var(--font-mono); font-size: 36px; color: var(--accent); font-weight: 500; }
.sim-sub { font-size: 12px; color: var(--green); margin-top: 4px; }
.insight { padding: 16px 20px; border-radius: var(--radius-sm); font-size: 12px; line-height: 1.7; margin-top: 16px; }
.insight-red { background: var(--red-dim); border: 1px solid rgba(224,69,90,0.2); }
.insight-amber { background: var(--amber-dim); border: 1px solid rgba(212,145,42,0.2); }
.insight-green { background: var(--green-dim); border: 1px solid rgba(53,161,98,0.2); }
.strategy-banner { background: linear-gradient(135deg, var(--surface) 0%, rgba(226,166,84,0.05) 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px 36px; margin-bottom: 40px; }
.strategy-banner h2 { font-family: var(--font-display); font-size: 22px; color: var(--text-bright); margin-bottom: 16px; }
.strategy-banner p { font-size: 13px; line-height: 1.8; color: var(--text); max-width: 800px; }
.strategy-banner .highlight { color: var(--accent); font-weight: 600; }
.section-title { font-family: var(--font-body); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin: 48px 0 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.card svg { display: block; }
.accent { color: var(--accent); } .cyan { color: var(--cyan); } .red { color: var(--red); } .green { color: var(--green); } .dim { color: var(--text-dim); } .mono { font-family: var(--font-mono); }

@media (max-width: 900px) {
  .container { padding: 16px; } .kpi-row { grid-template-columns: repeat(3, 1fr); gap: 10px; }

  .strategy-banner { padding: 20px 24px; margin-bottom: 24px; } .strategy-banner h2 { font-size: 16px; } .strategy-banner p { font-size: 12px; }

  .data-table { font-size: 12px; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .data-table th { font-size: 10px; padding: 8px 8px; white-space: nowrap; }
  .data-table td { font-size: 11px; padding: 8px 8px; white-space: nowrap; }
  .bar-label { min-width: 70px; font-size: 11px; } .bar-val { font-size: 10px; min-width: 45px; } .bar-item { font-size: 11px; gap: 8px; }
  .mini-bars { gap: 4px; height: 80px; } .mini-bar-label { font-size: 9px; }
  .sim-big { font-size: 28px; } .sim-slider { height: 6px; } .sim-result { padding: 16px; } .insight { font-size: 11px; padding: 12px 14px; }
}
@media (max-width: 480px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr); gap: 8px; } .kpi { padding: 12px 10px; } .kpi-value { font-size: 20px; } .kpi-change { font-size: 9px; }
  .container { padding: 10px; } .card { padding: 14px; border-radius: 8px; } .strategy-banner { padding: 16px 18px; }
  .bar-label { min-width: 55px; font-size: 10px; } .bar-val { font-size: 9px; min-width: 35px; } .bar-item { gap: 6px; }
  .data-table th { font-size: 9px; padding: 6px 5px; } .data-table td { font-size: 10px; padding: 6px 5px; }
}
</style>

// ═══════════ 渲染引擎 ═══════════
function fmt(n) { return n.toLocaleString(); }
function pct(v) { return v.toFixed(1) + '%'; }

// KPI 行
function renderKPIs() {
  const kpis = [
    { label: '月营收', sub: `${D.period.slice(-2)}月`, val: (D.revenue/10000).toFixed(1), unit: '万', change: `▲ ${D.yoyGrowth}% YoY`, changeCls: 'up', dot: 'ok' },
    { label: '净利润', sub: `${D.period.slice(-2)}月`, val: (D.profit/10000).toFixed(2), unit: '万', change: `▲ 净利率 ${D.margin}%`, changeCls: 'up', dot: 'ok' },
    { label: '付薪比', sub: `${D.period.slice(-2)}月`, val: D.payRatio.toFixed(1), unit: '%', change: '目标 ≤55%', changeCls: 'down', dot: 'warn' },
    { label: '折扣差额', sub: `${D.period.slice(-2)}月`, val: (D.discountGap/10000).toFixed(2), unit: '万', change: '门店100%承担', changeCls: 'down', dot: 'warn', valColor: 'var(--red)' },
    { label: '跨月留存', sub: '1-5月均', val: D.retention.toFixed(1), unit: '%', change: '月换血 3/4', changeCls: 'down', dot: 'warn', valColor: 'var(--amber)' },
    { label: '边际利润', sub: `${D.period.slice(-2)}月`, val: D.marginalProfit, unit: '/单', change: `保本点 ${(D.breakeven/10000).toFixed(1)}万`, changeCls: '', dot: 'ok' },
  ];
  document.getElementById('kpi-row').innerHTML = kpis.map(k => `
    <div class="kpi"><div class="kpi-dot ${k.dot}"></div>
      <div class="kpi-label">${k.label} <span class="dim" style="font-size:9px;font-weight:400;">${k.sub}</span></div>
      <div class="kpi-value"${k.valColor ? ` style="color:${k.valColor}"` : ''}>${k.val}<span class="unit">${k.unit}</span></div>
      <div class="kpi-change ${k.changeCls}">${k.change}</div>
    </div>`).join('');
}

}

// ═══════════ 模拟器 ═══════════
function priceSim() {
  const inc = parseInt(document.getElementById('pr1').value);
  const el = parseFloat(document.getElementById('pr2').value);
  document.getElementById('ps1').textContent = '¥' + inc;
  document.getElementById('ps2').textContent = el.toFixed(2);
  if (inc === 0) { document.getElementById('price-profit').textContent = '¥0'; document.getElementById('price-profit').style.color = '#7b8ba3'; document.getElementById('price-detail').textContent = '拖动滑块查看效果'; return; }
  const bp = 228, bo = 379, np = bp + inc, lo = Math.round(bo * inc / bp * el);
  const delta = (bo - lo) * np - bo * bp;
  const pd = delta * 0.5;
  document.getElementById('price-profit').textContent = (pd >= 0 ? '+' : '') + '¥' + fmt(Math.round(pd)) + '/月';
  document.getElementById('price-profit').style.color = pd >= 0 ? '#35a162' : '#e0455a';
  document.getElementById('price-detail').textContent = `新价¥${np} · 流失${lo}单(${(inc/bp*el*100).toFixed(1)}%) · 营收¥${fmt(bo*bp)}→¥${fmt((bo-lo)*np)}`;
}
function sim() {
  const ret = parseFloat(document.getElementById('r1').value), prv = parseInt(document.getElementById('r2').value), asp = parseInt(document.getElementById('r3').value);
  document.getElementById('s1').textContent = ret.toFixed(1) + '%'; document.getElementById('s2').textContent = prv + '%'; document.getElementById('s3').textContent = '¥' + asp;
  const br = 176759, fc = 31035, vr = (154804 - fc) / br;
  const tr = br * (1 + (ret - 23.7) / 100 * 0.4) * (1 + (prv - 5) / 100 * 0.5) * (asp / 158);
  const p = tr - (tr * vr + fc);
  document.getElementById('sim-profit').textContent = '¥' + fmt(Math.round(p));
  document.getElementById('sim-margin').textContent = '净利率 ' + (tr > 0 ? (p / tr * 100).toFixed(1) : '0.0') + '%';
  document.getElementById('sim-profit').style.color = p > 50000 ? '#35a162' : p > 25000 ? '#e2a654' : '#e0455a';
}

renderKPIs(); renderBanner(); renderCards();
priceSim(); sim();
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.bar-fill').forEach(b => { const w = b.style.width; b.style.width = '0%'; setTimeout(() => b.style.width = w, 200); });
});
</script>
